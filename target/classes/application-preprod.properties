# ═══════════════════════════════════════════
# PERFIL: preprod  (Koyeb + db4free)
# ═══════════════════════════════════════════

server.port=${PORT:8080}

# MySQL — db4free
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA — update crea tablas si no existen (pre-prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Uploads
app.upload.dir=${UPLOAD_DIR:/app/uploads}

# OpenPay sandbox
openpay.merchant-id=${OPENPAY_MERCHANT_ID}
openpay.private-key=${OPENPAY_PRIVATE_KEY}
openpay.public-key=${OPENPAY_PUBLIC_KEY}
openpay.sandbox=true

# Frontend URL (para links en emails)
app.frontend-url=${FRONTEND_URL}

# Email — Resend
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${MAIL_PASSWORD}
