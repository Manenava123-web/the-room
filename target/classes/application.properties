# ═══════════════════════════════════════════
# Perfil activo  →  set SPRING_PROFILE=prod en el servidor
# ═══════════════════════════════════════════
spring.profiles.active=${SPRING_PROFILE:dev}

# ═══════════════════════════════════════════
# MySQL — driver (común a todos los perfiles)
# ═══════════════════════════════════════════
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═══════════════════════════════════════════
# JPA / Hibernate — configuración común
# ═══════════════════════════════════════════
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ═══════════════════════════════════════════
# JWT — expiración (24 h, igual en todos los ambientes)
# ═══════════════════════════════════════════
app.jwt.expiration=86400000

# ═══════════════════════════════════════════
# Subida de archivos — límites (común)
# ═══════════════════════════════════════════
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ═══════════════════════════════════════════
# Email — configuración SMTP común
# ═══════════════════════════════════════════
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ═══════════════════════════════════════════
# Negocio — datos estáticos del estudio
# ═══════════════════════════════════════════
notificaciones.studio-nombre=The Room Studio

# ═══════════════════════════════════════════
# Capacidad — límites mensuales de reservaciones
# Cycling : 15 bicis × 3 horarios × 5 días × 4 semanas = 900
# Pilates : 21 cupos  × 1 horario  × 5 días × 4 semanas = 420
# ═══════════════════════════════════════════
app.cycling.limite-mensual=900
app.pilates.limite-mensual=420
