# ═══════════════════════════════════════════
# Perfil activo  →  set SPRING_PROFILE=prod en el servidor
# ═══════════════════════════════════════════
spring.profiles.active=${SPRING_PROFILE:dev}

# ═══════════════════════════════════════════
# MySQL — driver (común a todos los perfiles)
# ═══════════════════════════════════════════
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═══════════════════════════════════════════
# JPA / Hibernate — configuración común
# ═══════════════════════════════════════════
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ═══════════════════════════════════════════
# JWT — expiración (24 h, igual en todos los ambientes)
# ═══════════════════════════════════════════
app.jwt.expiration=86400000

# ═══════════════════════════════════════════
# Subida de archivos — límites (común)
# ═══════════════════════════════════════════
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# Defer multipart parsing to controller scope so MultipartException reaches @RestControllerAdvice
spring.servlet.multipart.resolve-lazily=true

# ═══════════════════════════════════════════
# Email — Resend HTTP API (ver resend.api-key en cada perfil)
# ═══════════════════════════════════════════

# ═══════════════════════════════════════════
# Negocio — datos estáticos del estudio
# ═══════════════════════════════════════════
notificaciones.studio-nombre=The Room Studio

# ═══════════════════════════════════════════
# Pagos — feature flags
# true  → pago en línea activo (flujo normal con OpenPay)
# false → pago en línea deshabilitado; el cliente ve un modal
#         indicándole que debe acudir al estudio a pagar
# ═══════════════════════════════════════════
app.pago-en-linea.habilitado=true
