# ═══════════════════════════════════════════
# PERFIL: prod  (servidor de producción)
# Todas las propiedades sensibles se leen de
# variables de entorno del sistema operativo.
# ═══════════════════════════════════════════

# Servidor
server.port=${PORT:8080}

# ═══════════════════════════════════════════
# MySQL
# Variables requeridas: DB_URL, DB_USER, DB_PASSWORD
# ═══════════════════════════════════════════
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ═══════════════════════════════════════════
# JPA / Hibernate
# validate: no modifica el esquema en prod
# ═══════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Permite arrancar aunque la BD no esté disponible al inicio
spring.datasource.hikari.initialization-fail-timeout=-1

# ═══════════════════════════════════════════
# JWT
# Variable requerida: JWT_SECRET
# Generar con: [Convert]::ToBase64String((1..64 | ForEach-Object { Get-Random -Maximum 256 }))
# ═══════════════════════════════════════════
app.jwt.secret=${JWT_SECRET}

# ═══════════════════════════════════════════
# CORS — solo los orígenes del dominio real
# Variable requerida: CORS_ORIGINS
# Ejemplo: https://theroom.com,https://www.theroom.com
# ═══════════════════════════════════════════
app.cors.allowed-origins=${CORS_ORIGINS}

# ═══════════════════════════════════════════
# Subida de archivos
# ═══════════════════════════════════════════
app.upload.dir=${UPLOAD_DIR:uploads}

# ═══════════════════════════════════════════
# OpenPay — producción real (sandbox=false)
# Variables requeridas: OPENPAY_MERCHANT_ID,
#   OPENPAY_PRIVATE_KEY, OPENPAY_PUBLIC_KEY
# ═══════════════════════════════════════════
openpay.merchant-id=${OPENPAY_MERCHANT_ID}
openpay.private-key=${OPENPAY_PRIVATE_KEY}
openpay.public-key=${OPENPAY_PUBLIC_KEY}
openpay.sandbox=${OPENPAY_SANDBOX:false}

# ═══════════════════════════════════════════
# Frontend URL — para links en emails
# Variable requerida: FRONTEND_URL
# Ejemplo: https://theroom.com
# ═══════════════════════════════════════════
app.frontend-url=${FRONTEND_URL}

# ═══════════════════════════════════════════
# Email
# Variables requeridas: MAIL_USERNAME, MAIL_PASSWORD
# ═══════════════════════════════════════════
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${MAIL_PASSWORD}
