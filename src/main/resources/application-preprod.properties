# ═══════════════════════════════════════════
# PERFIL: preprod  (Koyeb + db4free)
# ═══════════════════════════════════════════

server.port=${PORT:8080}

# MySQL — db4free
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA — update crea tablas si no existen (pre-prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Permite arrancar aunque la BD no esté disponible al inicio
spring.datasource.hikari.initialization-fail-timeout=-1

# JWT
app.jwt.secret=${JWT_SECRET}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Uploads
app.upload.dir=${UPLOAD_DIR:/app/uploads}

# Pagos — feature flags
app.pago-en-linea.habilitado=${PAGO_EN_LINEA_HABILITADO:true}

# OpenPay sandbox
openpay.merchant-id=${OPENPAY_MERCHANT_ID}
openpay.private-key=${OPENPAY_PRIVATE_KEY}
openpay.public-key=${OPENPAY_PUBLIC_KEY}
openpay.sandbox=true

# Frontend URL (para links en emails)
app.frontend-url=${FRONTEND_URL}

# Email — Resend HTTP API
resend.api-key=${MAIL_PASSWORD}
resend.from=The Room Studio <noreply@the-room-studio.com>

# ═══════════════════════════════════════════
# Cancelaciones — horas mínimas de anticipación
# ═══════════════════════════════════════════
app.cancelacion.cycling-horas=${CANCELACION_CYCLING_HORAS}
app.cancelacion.pilates-horas=${CANCELACION_PILATES_HORAS}

# ═══════════════════════════════════════════
# Capacidad — límites mensuales de reservaciones
# Cycling : 15 bicis × 3 horarios × 5 días × 4 semanas = 900
# Pilates : 21 cupos  × 1 horario  × 5 días × 4 semanas = 420
# ═══════════════════════════════════════════
app.cycling.limite-mensual=${CAPACIDAD_CYCLING_MENSUAL}
app.pilates.limite-mensual=${CAPACIDAD_PILATES_MENSUAL}